name: Daily Chain Submit

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Submit daily snapshot to Elysium
        env:
          VF_SITE_URL: ${{ secrets.VF_SITE_URL }}
          VF_SITE_TOKEN: ${{ secrets.VF_SITE_TOKEN }}
          ELY_PRIVATE_KEY: ${{ secrets.ELY_PRIVATE_KEY }}
          ELY_RPC_URL: ${{ secrets.ELY_RPC_URL }}
        run: node submit-daily.js
